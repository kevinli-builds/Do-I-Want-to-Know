services:
  - type: web
    name: diwtkn-backend
    runtime: node
    rootDir: backend
    # NODE_ENV=production (below) makes `npm install` skip devDependencies, but the
    # build needs them (typescript/tsc, @types/*). --include=dev forces them in for
    # the build; runtime still runs with NODE_ENV=production.
    buildCommand: npm install --include=dev && npm run db:generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false        # You'll paste this in from Neon
      - key: NODE_ENV
        value: production
